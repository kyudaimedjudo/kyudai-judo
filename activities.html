  <script src="js/main.js"></script>
  <script>
    // XSSサニタイズ
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    const MONTHS_JA = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

    // 大会結果
    fetch('data/results.json')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        const tbody = document.getElementById('results-tbody');
        if (!data.length) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--color-text-light)">データがありません</td></tr>'; return; }
        tbody.innerHTML = data.map(d => `
          <tr>
            <td>${esc(d.date)}</td>
            <td>${esc(d.tournament)}</td>
            <td>${esc(d.category)}</td>
            <td><span class="result-badge ${esc(d.badge)}">${esc(d.result)}</span></td>
          </tr>`).join('');
      })
      .catch(() => {
        document.getElementById('results-tbody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:#991b1b">データの読み込みに失敗しました</td></tr>';
      });

    // 練習日誌
    fetch('data/diary.json')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        const list = document.getElementById('diary-list');
        if (!data.length) { list.innerHTML = '<p style="color:var(--color-text-light)">データがありません</p>'; return; }
        list.innerHTML = data.map(d => {
          const dt = new Date(d.date);
          const month = MONTHS_JA[dt.getMonth()] || '';
          const day = dt.getDate();
          return `
          <div class="diary-card">
            <div class="diary-date-col">
              <div class="diary-month">${esc(month)}</div>
              <div class="diary-day">${day}</div>
            </div>
            <div class="diary-body">
              <h3>${esc(d.title)}</h3>
              <p>${esc(d.content)}</p>
            </div>
          </div>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('diary-list').innerHTML = '<p style="color:#991b1b">データの読み込みに失敗しました</p>';
      });

    // 合宿・イベント
    fetch('data/events.json')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        const grid = document.getElementById('event-grid');
        if (!data.length) { grid.innerHTML = '<p style="color:var(--color-text-light)">データがありません</p>'; return; }
        grid.innerHTML = data.map(d => `
          <div class="event-card">
            <div class="event-image">${d.photo ? `<img src="${esc(d.photo)}" alt="${esc(d.title)}">` : esc(d.emoji || '📸')}</div>
            <div class="event-body">
              <div class="event-date">${esc(d.date)}</div>
              <h3>${esc(d.title)}</h3>
              <p>${esc(d.content)}</p>
            </div>
          </div>`).join('');
      })
      .catch(() => {
        document.getElementById('event-grid').innerHTML = '<p style="color:#991b1b">データの読み込みに失敗しました</p>';
      });
  </script>
