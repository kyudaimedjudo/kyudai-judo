<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動記録 | 九州大学医学部柔道部</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">九大医学部<span>柔道部</span></a>
      <ul class="navbar-links">
        <li><a href="index.html">トップ</a></li>
        <li><a href="members.html">部員紹介</a></li>
        <li><a href="activities.html">活動記録</a></li>
      </ul>
      <button class="hamburger" aria-label="メニューを開く">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <header class="page-header">
    <h1>活動記録</h1>
    <p>大会結果・練習日誌・合宿イベントの記録です。</p>
  </header>

  <section class="section">
    <div class="container">

      <div class="activity-tabs">
        <button class="activity-tab active" data-target="panel-results">大会結果</button>
        <button class="activity-tab" data-target="panel-diary">練習日誌</button>
        <button class="activity-tab" data-target="panel-events">合宿・イベント</button>
      </div>

      <!-- 大会結果 -->
      <div id="panel-results" class="activity-panel active">
        <table class="result-table">
          <thead>
            <tr>
              <th>開催日</th>
              <th>大会名</th>
              <th>種目</th>
              <th>結果</th>
            </tr>
          </thead>
          <tbody id="results-tbody">
            <tr><td colspan="4" style="text-align:center;color:var(--color-text-light)">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 練習日誌 -->
      <div id="panel-diary" class="activity-panel">
        <div class="diary-list" id="diary-list">
          <p style="color:var(--color-text-light)">読み込み中...</p>
        </div>
      </div>

      <!-- 合宿・イベント -->
      <div id="panel-events" class="activity-panel">
        <div class="event-grid" id="event-grid">
          <p style="color:var(--color-text-light)">読み込み中...</p>
        </div>
      </div>

    </div>
  </section>

  <footer class="footer">
    <div class="footer-logo">九大医学部<span>柔道部</span></div>
    <nav class="footer-links">
      <a href="index.html">トップ</a>
      <a href="members.html">部員紹介</a>
      <a href="activities.html">活動記録</a>
    </nav>
    <p>© 2025 九州大学医学部柔道部</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // 大会結果
    fetch('data/results.json')
      .then(r => r.json())
      .then(data => {
        const tbody = document.getElementById('results-tbody');
        if (!data.length) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--color-text-light)">データがありません</td></tr>'; return; }
        tbody.innerHTML = data.map(d => `
          <tr>
            <td>${d.date}</td>
            <td>${d.tournament}</td>
            <td>${d.category}</td>
            <td><span class="result-badge ${d.badge}">${d.result}</span></td>
          </tr>`).join('');
      });

    // 練習日誌
    fetch('data/diary.json')
      .then(r => r.json())
      .then(data => {
        const list = document.getElementById('diary-list');
        if (!data.length) { list.innerHTML = '<p style="color:var(--color-text-light)">データがありません</p>'; return; }
        list.innerHTML = data.map(d => {
          const dt = new Date(d.date);
          const month = dt.toLocaleString('en-US', { month: 'short' }).toUpperCase();
          const day = dt.getDate();
          return `
          <div class="diary-card">
            <div class="diary-date-col">
              <div class="diary-month">${month}</div>
              <div class="diary-day">${day}</div>
            </div>
            <div class="diary-body">
              <h3>${d.title}</h3>
              <p>${d.content}</p>
            </div>
          </div>`;
        }).join('');
      });

    // 合宿・イベント
    fetch('data/events.json')
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById('event-grid');
        if (!data.length) { grid.innerHTML = '<p style="color:var(--color-text-light)">データがありません</p>'; return; }
        grid.innerHTML = data.map(d => `
          <div class="event-card">
            <div class="event-image">${d.emoji || '📸'}</div>
            <div class="event-body">
              <div class="event-date">${d.date}</div>
              <h3>${d.title}</h3>
              <p>${d.content}</p>
            </div>
          </div>`).join('');
      });
  </script>
</body>
</html>
