<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>部員紹介 | 九州大学医学部柔道部</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">九大医学部<span>柔道部</span></a>
      <ul class="navbar-links">
        <li><a href="index.html">トップ</a></li>
        <li><a href="members.html">部員紹介</a></li>
        <li><a href="activities.html">活動記録</a></li>
      </ul>
      <button class="hamburger" aria-label="メニューを開く">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <header class="page-header">
    <h1>部員紹介</h1>
    <p>九大医学部柔道部のメンバーをご紹介します。</p>
  </header>

  <section class="section">
    <div class="container">

      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-filter="all">全員</button>
        <button class="filter-tab" data-filter="1">1年</button>
        <button class="filter-tab" data-filter="2">2年</button>
        <button class="filter-tab" data-filter="3">3年</button>
        <button class="filter-tab" data-filter="4">4年</button>
        <button class="filter-tab" data-filter="5">5年</button>
        <button class="filter-tab" data-filter="6">6年</button>
        <button class="filter-tab" data-filter="院生">院生</button>
      </div>

      <div class="members-grid" id="members-grid">
        <p style="color:var(--color-text-light)">読み込み中...</p>
      </div>

      <div style="margin-top:3.5rem;background:var(--color-white);border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow);text-align:center;">
        <h2 class="section-title" style="text-align:center;">入部を希望する方へ</h2>
        <p style="color:var(--color-text-light);margin-top:1.2rem;margin-bottom:1.5rem;">
          柔道の経験は問いません。初心者の方も大歓迎です。<br>
          まずは体験練習にお越しください。
        </p>
        <a href="activities.html" class="btn btn-accent">活動記録を見る</a>
      </div>

    </div>
  </section>

  <footer class="footer">
    <div class="footer-logo">九大医学部<span>柔道部</span></div>
    <nav class="footer-links">
      <a href="index.html">トップ</a>
      <a href="members.html">部員紹介</a>
      <a href="activities.html">活動記録</a>
    </nav>
    <p>© 2025 九州大学医学部柔道部</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    let allMembers = [];

    function renderMembers(filter) {
      const grid = document.getElementById('members-grid');
      const filtered = filter === 'all' ? allMembers : allMembers.filter(m => m.year === filter);
      if (!filtered.length) {
        grid.innerHTML = '<p style="color:var(--color-text-light)">該当する部員がいません</p>';
        return;
      }
      grid.innerHTML = filtered.map(m => `
        <div class="member-card" data-year="${m.year}">
          <div class="member-photo">🥋</div>
          <div class="member-info">
            <div class="member-name">${m.name}</div>
            <div class="member-meta">
              <span class="member-badge">${m.year}${m.year === '院生' ? '' : '年'}</span>
              ${m.belt ? `<span class="member-badge belt">${m.belt}</span>` : ''}
            </div>
            <div class="member-hometown">📍 ${m.hometown}出身${m.school ? ` / ${m.school}` : ''}</div>
            ${m.comment ? `<div class="member-comment">${m.comment}</div>` : ''}
          </div>
        </div>`).join('');
    }

    fetch('data/members.json')
      .then(r => r.json())
      .then(data => {
        allMembers = data;
        renderMembers('all');

        document.querySelectorAll('.filter-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderMembers(tab.dataset.filter);
          });
        });
      });
  </script>
</body>
</html>
