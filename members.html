  <script src="js/main.js"></script>
  <script>
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    let allMembers = [];

    function renderMembers(filter) {
      const grid = document.getElementById('members-grid');
      const filtered = filter === 'all' ? allMembers : allMembers.filter(m => m.year === filter);
      if (!filtered.length) {
        grid.innerHTML = '<p style="color:var(--color-text-light)">該当する部員がいません</p>';
        return;
      }
      grid.innerHTML = filtered.map(m => `
        <div class="member-card" data-year="${esc(m.year)}">
          <div class="member-photo">${m.photo ? `<img src="${esc(m.photo)}" alt="${esc(m.name)}">` : '🥋'}</div>
          <div class="member-info">
            <div class="member-name">${esc(m.name)}</div>
            <div class="member-meta">
              <span class="member-badge">${esc(m.year)}${m.year === '院生' ? '' : '年'}</span>
              ${m.belt ? `<span class="member-badge belt">${esc(m.belt)}</span>` : ''}
            </div>
            <div class="member-hometown">📍 ${esc(m.hometown)}出身${m.school ? ` / ${esc(m.school)}` : ''}</div>
            ${m.comment ? `<div class="member-comment">${esc(m.comment)}</div>` : ''}
          </div>
        </div>`).join('');
    }

    fetch('data/members.json')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        allMembers = data;
        renderMembers('all');

        document.querySelectorAll('.filter-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderMembers(tab.dataset.filter);
          });
        });
      })
      .catch(() => {
        document.getElementById('members-grid').innerHTML = '<p style="color:#991b1b">部員データの読み込みに失敗しました</p>';
      });
  </script>
